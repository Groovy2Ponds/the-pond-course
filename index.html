  },
    React.createElement('span', null, drawerOpen ? "✕ CLOSE" : "☰ MODULES"),
    React.createElement('span', { style: { color: YELLOW, fontSize: 9 } }, `${active + 1}/10`)
  );

  // Mobile drawer
  const mobileDrawer = isMobile && drawerOpen && React.createElement('div', {
    style: {
      background: WHITE, border: "1px solid #E8E8E4", borderRadius: 10,
      padding: "12px 10px", marginBottom: 16,
      boxShadow: "0 4px 20px rgba(0,0,0,0.08)"
    }
  },
    sections.map((sec, i) => React.createElement(SidebarItem, { key: i, section: sec, status: statuses[i], isActive: active === i, onClick: () => goTo(i) }))
  );

  const flowDiagram = React.createElement('div', { style: { marginBottom: 20 } },
    React.createElement('div', { style: { fontSize: 8, letterSpacing: 2, color: GRAY, marginBottom: 12, fontFamily: "monospace" } }, "HOW IT WORKS"),
    React.createElement('div', {
      style: { display: "flex", alignItems: "center", flexWrap: "wrap", gap: 6, background: WHITE, border: "1px solid #E8E8E4", borderRadius: 12, padding: "16px 16px" }
    },
      s.flow.map((node, i) => React.createElement('div', { key: i, style: { display: "flex", alignItems: "center" } },
        React.createElement(FlowNode, { label: node.label, sub: node.sub, highlight: i === s.flow.length - 1 }),
        i < s.flow.length - 1 && React.createElement(Arrow)
      ))
    )
  );

  const introCardEl = React.createElement('div', {
    style: { background: WHITE, border: `1.5px solid ${YELLOW}`, borderRadius: 10, padding: "14px 20px", marginBottom: 16, display: "flex", alignItems: "center", gap: 12 }
  },
    React.createElement('span', { style: { color: YELLOW, fontSize: 18, flexShrink: 0 } }, "→"),
    React.createElement('div', { style: { fontFamily: "Georgia, serif", fontSize: 13, fontStyle: "italic", color: DARK, lineHeight: 1.5 } }, s.introCard)
  );

  const annotationEl = React.createElement('div', { style: { marginBottom: 28 } },
    React.createElement('button', {
      onClick: toggleReveal,
      style: { background: "transparent", border: `1px solid ${isRevealed ? GRAY : YELLOW}`, borderRadius: 7, padding: "9px 18px", fontSize: 10, fontWeight: 700, cursor: "pointer", letterSpacing: 1, fontFamily: "monospace", color: isRevealed ? GRAY : YELLOW, marginBottom: isRevealed ? 14 : 0, transition: "all 0.2s" }
    }, isRevealed ? "HIDE ANNOTATION ↑" : "SEE THE ANNOTATION →"),
    isRevealed && React.createElement('div', {
      style: { background: "#FFFDE7", border: `1px solid ${YELLOW}`, borderRadius: "0 10px 10px 10px", padding: "18px 22px", fontFamily: "Georgia, serif", fontSize: 11.5, color: MID, lineHeight: 1.75, whiteSpace: "pre-line" }
    }, s.annotation)
  );

  const ctaEl = !isDone
    ? React.createElement('button', {
        onClick: markComplete,
        style: { background: YELLOW, color: DARK, border: "none", borderRadius: 9, padding: "13px 30px", fontSize: 11, fontWeight: 700, cursor: "pointer", letterSpacing: 1, fontFamily: "monospace", boxShadow: `0 4px 16px ${YELLOW}44` }
      }, active === total - 1 ? "COMPLETE COURSE →" : "MARK COMPLETE  →  NEXT MODULE")
    : isDone && active < total - 1
    ? React.createElement('button', {
        onClick: () => goTo(active + 1),
        style: { background: DARK, color: YELLOW, border: `1.5px solid ${YELLOW}`, borderRadius: 9, padding: "13px 30px", fontSize: 11, fontWeight: 700, cursor: "pointer", letterSpacing: 1, fontFamily: "monospace" }
      }, "NEXT MODULE →")
    : React.createElement('button', {
        onClick: () => setShowCert(true),
        style: { background: YELLOW, color: DARK, border: "none", borderRadius: 9, padding: "13px 30px", fontSize: 11, fontWeight: 700, cursor: "pointer", letterSpacing: 1, fontFamily: "monospace", boxShadow: `0 4px 16px ${YELLOW}44` }
      }, "VIEW YOUR CERTIFICATE →");

  const main = React.createElement('div', { style: { flex: 1, padding: isMobile ? "20px 18px" : "28px 36px", overflowY: "auto" } },
    mobileDrawerBtn,
    mobileDrawer,
    React.createElement('div', { style: { marginBottom: 20 } },
      React.createElement('div', { style: { fontSize: 8, letterSpacing: 3, color: YELLOW, marginBottom: 6, fontFamily: "monospace" } },
        `MODULE ${s.number}  ·  ${s.title}`,
        isDone && React.createElement('span', { style: { marginLeft: 10 } }, "✓ COMPLETE")
      ),
      React.createElement('div', { style: { fontSize: isMobile ? 17 : 20, fontWeight: 700, color: DARK, lineHeight: 1.25 } }, s.technique)
    ),
    React.createElement(ExhibitBlock, { exhibit: s.exhibit }),
    flowDiagram,
    introCardEl,
    annotationEl,
    ctaEl
  );

  return React.createElement('div', { style: { fontFamily: "Georgia, serif", background: LIGHT, minHeight: "100vh", display: "flex", flexDirection: "column" } },
    headerEl,
    React.createElement(ProgressBar, { completed, total }),
    React.createElement('div', { style: { display: "flex", flex: 1, overflow: "hidden", minHeight: 0 } }, desktopSidebar, main)
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
